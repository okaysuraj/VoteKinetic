
services:
  db:
    image: postgres:15-alpine
    container_name: votekinetic_db
    environment:
      POSTGRES_USER: votekinetic
      POSTGRES_PASSWORD: votekineticpassword
      POSTGRES_DB: votekinetic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: votekinetic_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
